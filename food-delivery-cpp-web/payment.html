<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScootEats Payment Gateway</title>
  <style>
    :root {
      --bg: #07121f;
      --card: #122034;
      --text: #eafff5;
      --muted: #b7d8c8;
      --primary: #00ff8a;
      --secondary: #00c76d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #0f2b1c, #061119 60%);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(92vw, 500px);
      background: var(--card);
      border: 1px solid rgba(0, 255, 138, 0.35);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 0 40px rgba(0, 255, 138, 0.2);
    }
    h1 { margin-top: 0; font-size: 1.4rem; }
    p { color: var(--muted); }
    .amount {
      font-size: 2rem;
      font-weight: 700;
      margin: 18px 0;
      color: var(--primary);
      text-shadow: 0 0 18px rgba(0, 255, 138, 0.38);
    }
    .row { display: flex; justify-content: space-between; margin: 8px 0; }
    button {
      width: 100%;
      margin-top: 18px;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      color: #031108;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>Secure Payment Gateway</h1>
    <p>Complete your payment to place the order.</p>
    <div class="row"><span>Merchant</span><strong>ScootEats</strong></div>
    <div class="row"><span>Order ID</span><strong id="orderId">-</strong></div>
    <div class="amount" id="amount">Rs. 0</div>
    <button id="payNowBtn">Pay Now</button>
  </section>

  <script>
    const session = JSON.parse(localStorage.getItem("scootEatsPayment") || "{}");
    document.getElementById("orderId").textContent = session.orderId || "-";
    document.getElementById("amount").textContent = `Rs. ${session.total || 0}`;
    document.getElementById("payNowBtn").addEventListener("click", () => {
      const query = new URLSearchParams({
        payment: "success",
        orderId: String(session.orderId || ""),
        amount: String(session.total || 0)
      });
      location.href = `index.html?${query.toString()}`;
    });
  </script>
</body>
</html>
